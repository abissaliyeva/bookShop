services:
  - type: web
    name: bookshop
    runtime: php
    plan: free
    region: frankfurt
    buildCommand: composer install --no-dev --optimize-autoloader --no-interaction && php artisan config:clear && php artisan config:cache && php artisan route:cache && php artisan view:cache
    startCommand: php artisan serve --host=0.0.0.0 --port=$PORT
    envVars:
      - key: APP_NAME
        value: BookShop
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "true"
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_DRIVER
        value: file
      - key: LOG_CHANNEL
        value: stack
      - key: QUEUE_CONNECTION
        value: sync
      - key: FILESYSTEM_DISK
        value: local
      - key: DB_CONNECTION
        value: pgsql